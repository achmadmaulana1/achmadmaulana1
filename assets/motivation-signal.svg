    @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
    @keyframes flicker{0%,100%{opacity:.55}50%{opacity:1}}
  </style>
  <rect width="760" height="220" rx="28" fill="#0D1117"/>
