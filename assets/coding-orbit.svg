<svg width="520" height="340" viewBox="0 0 520 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .screen{animation: glow 2.4s ease-in-out infinite}
    .dot1{animation: orbit1 5s linear infinite; transform-origin:260px 160px}
    .dot2{animation: orbit2 6s linear infinite; transform-origin:260px 160px}
    .line{animation: pulse 1.8s ease-in-out infinite}
    @keyframes glow{0%,100%{filter:drop-shadow(0 0 4px #38bdf8)}50%{filter:drop-shadow(0 0 18px #22c55e)}}
    @keyframes orbit1{to{transform:rotate(360deg)}}
    @keyframes orbit2{to{transform:rotate(-360deg)}}
    @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  </style>
  <rect width="520" height="340" rx="24" fill="#0D1117"/>
  <rect x="98" y="82" width="324" height="178" rx="18" fill="#111827" stroke="#334155" stroke-width="4"/>
