<svg width="980" height="220" viewBox="0 0 980 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="emptyDays" width="13" height="13" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" rx="2" fill="#E5E7EB"/>
    </pattern>
    <linearGradient id="lifeBar" x1="42" y1="0" x2="938" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16A34A"/>
      <stop offset=".5" stop-color="#4ADE80"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <style>
    .cat{animation:catHunt 16s cubic-bezier(.42,0,.22,1) infinite, catHide 16s linear infinite}
    .tail{animation:tail 1.1s ease-in-out infinite; transform-origin:-19px 4px}
    .mouth{animation:chomp .42s ease-in-out infinite; transform-origin:20px 1px}
    .paw{animation:paw .7s ease-in-out infinite}
    .route{stroke-dasharray:8 9; animation:routeFlow 16s linear infinite}
    .target{animation-duration:16s; animation-timing-function:steps(1,end); animation-iteration-count:infinite}
    .t1{animation-name:e1}.t2{animation-name:e2}.t3{animation-name:e3}.t4{animation-name:e4}.t5{animation-name:e5}.t6{animation-name:e6}.t7{animation-name:e7}.t8{animation-name:e8}.t9{animation-name:e9}.t10{animation-name:e10}.t11{animation-name:e11}.t12{animation-name:e12}.t13{animation-name:e13}.t14{animation-name:e14}.t15{animation-name:e15}.t16{animation-name:e16}.t17{animation-name:e17}.t18{animation-name:e18}
    .remain{animation:remaining 16s linear infinite; transform-origin:42px 180px}

    @keyframes catHunt{
      0%,100%{transform:translate(697px,66px)}
      5.5%{transform:translate(645px,118px)}
      11%{transform:translate(593px,79px)}
      16.5%{transform:translate(541px,131px)}
      22%{transform:translate(476px,92px)}
      27.5%{transform:translate(424px,53px)}
      33%{transform:translate(385px,118px)}
      38.5%{transform:translate(333px,79px)}
      44%{transform:translate(281px,131px)}
      49.5%{transform:translate(229px,92px)}
      55%{transform:translate(177px,53px)}
      60.5%{transform:translate(125px,118px)}
      66%{transform:translate(86px,79px)}
      71.5%{transform:translate(151px,66px)}
      77%{transform:translate(268px,105px)}
      82.5%{transform:translate(359px,66px)}
      88%{transform:translate(515px,53px)}
      93.5%{transform:translate(671px,92px)}
      96%{transform:translate(671px,92px)}
      98%{transform:translate(697px,66px)}
    }
    @keyframes catHide{
      0%,95.8%{opacity:1}
      96%,99.2%{opacity:0}
      100%{opacity:1}
    }
    @keyframes routeFlow{to{stroke-dashoffset:-220}}
    @keyframes tail{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(16deg)}}
    @keyframes chomp{0%,100%{transform:rotate(0)}50%{transform:rotate(-18deg)}}
    @keyframes paw{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
    @keyframes remaining{0%{transform:scaleX(1)}94%{transform:scaleX(.1)}100%{transform:scaleX(1)}}

    @keyframes e1{0%,5.4%{fill:#22C55E}5.5%,99.2%{fill:#E5E7EB}100%{fill:#22C55E}}
    @keyframes e2{0%,10.9%{fill:#22C55E}11%,99.2%{fill:#E5E7EB}100%{fill:#22C55E}}
