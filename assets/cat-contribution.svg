<svg viewBox="-16 -32 880 192" width="880" height="192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="catPath" d="M832 0H0V16H832V32H0V48H832V64H0V80H832V96H0"/>
    <pattern id="baseGrid" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect x="2" y="2" width="12" height="12" rx="2" ry="2" fill="#ebedf0" stroke="#1b1f230a" stroke-width="1"/>
    </pattern>
    <linearGradient id="lifeBar" x1="0" y1="0" x2="848" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#216e39"/>
      <stop offset=".45" stop-color="#40c463"/>
      <stop offset="1" stop-color="#9be9a8"/>
    </linearGradient>
  </defs>

  <style>
    :root{
      --ce:#ebedf0;
      --c1:#9be9a8;
      --c2:#40c463;
      --c3:#30a14e;
      --c4:#216e39;
      --cat:#fbbf24;
      --cat2:#f59e0b;
      --ink:#1f2937;
    }
    .green-route{
      fill:none;
      stroke:var(--c2);
      stroke-width:12;
      stroke-linecap:butt;
      stroke-linejoin:miter;
      stroke-dasharray:12 4;
      shape-rendering:geometricPrecision;
    }
    .green-route.dark{
      stroke:var(--c4);
      stroke-dasharray:12 52;
      stroke-dashoffset:32;
      opacity:.72;
    }
    .green-route.mid{
      stroke:var(--c3);
      stroke-dasharray:12 36;
      stroke-dashoffset:80;
      opacity:.86;
    }
    .eat-mask{
      fill:none;
      stroke:var(--ce);
      stroke-width:14;
      stroke-linecap:butt;
      stroke-linejoin:miter;
      pathLength:1000;
      stroke-dasharray:0 1000;
      animation:eatAll 36000ms linear infinite;
    }
    .runner{
      offset-path:path("M832 0H0V16H832V32H0V48H832V64H0V80H832V96H0");
      offset-rotate:auto;
      animation:runPath 36000ms linear infinite, runnerFade 36000ms linear infinite;
    }
    .body1{animation-delay:280ms,280ms}
    .body2{animation-delay:560ms,560ms}
    .body3{animation-delay:840ms,840ms}
    .tail{animation:tail 850ms ease-in-out infinite;transform-origin:-8px 0}
    .mouth{animation:chomp 460ms ease-in-out infinite;transform-origin:17px 0}
    .bar{animation:bar 36000ms linear infinite;transform-origin:0 0}

    @keyframes runPath{
      0%{offset-distance:0%}
      96%{offset-distance:100%}
      100%{offset-distance:100%}
    }
    @keyframes eatAll{
      0%{stroke-dasharray:0 1000}
      96%{stroke-dasharray:1000 0}
      99.2%{stroke-dasharray:1000 0}
      100%{stroke-dasharray:0 1000}
    }
    @keyframes runnerFade{
      0%,96.3%{opacity:1}
      97%,99.2%{opacity:0}
      100%{opacity:1}
    }
    @keyframes bar{
      0%{transform:scaleX(1)}
      96%{transform:scaleX(.04)}
      100%{transform:scaleX(1)}
    }
    @keyframes tail{0%,100%{transform:rotate(-16deg)}50%{transform:rotate(18deg)}}
    @keyframes chomp{0%,100%{transform:rotate(0)}50%{transform:rotate(-18deg)}}
  </style>

  <rect x="0" y="0" width="848" height="112" fill="url(#baseGrid)"/>

  <use href="#catPath" class="green-route"/>
  <use href="#catPath" class="green-route mid"/>
  <use href="#catPath" class="green-route dark"/>
  <use href="#catPath" class="eat-mask"/>

  <rect height="12" width="848" x="0" y="144" rx="2" fill="#1f2937"/>
  <rect class="bar" height="12" width="848" x="0" y="144" rx="2" fill="url(#lifeBar)"/>

  <g class="runner body3">
    <circle r="7" fill="#92400e"/>
    <path class="tail" d="M-7 0C-20 -9 -22 9 -8 10" stroke="var(--cat)" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g class="runner body2"><circle r="8" fill="#b45309"/></g>
  <g class="runner body1"><circle r="9" fill="#d97706"/></g>

  <g class="runner">
    <ellipse cx="0" cy="0" rx="18" ry="15" fill="var(--cat)" stroke="#78350f" stroke-width="2.4"/>
    <path d="M-13 -10L-8 -22L-2 -9Z" fill="var(--cat)" stroke="#78350f" stroke-width="2"/>
    <path d="M9 -9L15 -22L18 -7Z" fill="var(--cat)" stroke="#78350f" stroke-width="2"/>
    <circle cx="-6" cy="-2" r="2.3" fill="#111827"/>
    <circle cx="7" cy="-2" r="2.3" fill="#111827"/>
    <path d="M1 4L-3 8H5L1 4Z" fill="#111827"/>
    <path class="mouth" d="M17 0L31 -7L31 8L17 3Z" fill="#ef4444"/>
    <path d="M-12 7L-22 11M-12 2L-23 2M13 7L23 11M13 2L24 2" stroke="#78350f" stroke-width="1.6" stroke-linecap="round"/>
  </g>
</svg>
