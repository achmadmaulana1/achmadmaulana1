    .body{filter:drop-shadow(0 2px 0 #78350f)}
    .b1{animation-delay:.18s,.18s}.b2{animation-delay:.36s,.36s}.b3{animation-delay:.54s,.54s}.b4{animation-delay:.72s,.72s}.b5{animation-delay:.9s,.9s}.b6{animation-delay:1.08s,1.08s}
    .mouth{animation:chomp .42s ease-in-out infinite; transform-origin:17px 0}
    .tail-tip{animation:tailTip .75s ease-in-out infinite; transform-origin:-7px 0}
    .route{stroke-dasharray:7 9; animation:routeMove 18s linear infinite}
    .target{animation-duration:18s; animation-timing-function:steps(1,end); animation-iteration-count:infinite}
    .t1{animation-name:e1}.t2{animation-name:e2}.t3{animation-name:e3}.t4{animation-name:e4}.t5{animation-name:e5}.t6{animation-name:e6}.t7{animation-name:e7}.t8{animation-name:e8}.t9{animation-name:e9}.t10{animation-name:e10}.t11{animation-name:e11}.t12{animation-name:e12}.t13{animation-name:e13}.t14{animation-name:e14}.t15{animation-name:e15}.t16{animation-name:e16}.t17{animation-name:e17}.t18{animation-name:e18}.t19{animation-name:e19}.t20{animation-name:e20}
