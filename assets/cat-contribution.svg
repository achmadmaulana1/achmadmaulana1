<svg width="980" height="190" viewBox="0 0 980 190" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="dayGrid" width="13" height="13" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" rx="2" fill="#E5E7EB"/>
    </pattern>
    <linearGradient id="bar" x1="42" y1="0" x2="938" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset=".55" stop-color="#4ADE80"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
  </defs>
  <style>
    .cat{animation:walk 8s ease-in-out infinite}
    .mouth{animation:chomp .48s ease-in-out infinite; transform-origin:86px 60px}
    .tail{animation:tail 1.2s ease-in-out infinite; transform-origin:80px 52px}
    .paw{animation:paw .8s ease-in-out infinite}
    .meal{animation:eat 8s steps(1,end) infinite}
    .m1{animation-delay:1s}.m2{animation-delay:1.8s}.m3{animation-delay:2.6s}.m4{animation-delay:3.4s}.m5{animation-delay:4.2s}.m6{animation-delay:5s}.m7{animation-delay:5.8s}
    @keyframes walk{
      0%{transform:translate(820px,50px) scale(.46)}
      50%{transform:translate(238px,50px) scale(.46)}
      100%{transform:translate(820px,50px) scale(.46)}
    }
    @keyframes chomp{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-13deg)}}
    @keyframes tail{0%,100%{transform:rotate(-9deg)}50%{transform:rotate(14deg)}}
    @keyframes paw{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
    @keyframes eat{0%,16%{opacity:1}17%,100%{opacity:.16}}
  </style>

  <rect width="980" height="190" rx="22" fill="#0D1117"/>
  <rect x="24" y="20" width="932" height="150" rx="18" fill="#111827" stroke="#263241" stroke-width="2"/>

  <g transform="translate(42 48)">
    <rect width="676" height="91" fill="url(#dayGrid)" opacity=".95"/>
    <rect x="676" y="0" width="10" height="10" rx="2" fill="#E5E7EB" opacity=".95"/>

    <g fill="#166534" opacity=".82">
      <rect x="26" y="26" width="10" height="10" rx="2"/>
      <rect x="65" y="52" width="10" height="10" rx="2"/>
      <rect x="117" y="13" width="10" height="10" rx="2"/>
      <rect x="182" y="65" width="10" height="10" rx="2"/>
      <rect x="260" y="39" width="10" height="10" rx="2"/>
      <rect x="338" y="0" width="10" height="10" rx="2"/>
      <rect x="403" y="52" width="10" height="10" rx="2"/>
      <rect x="481" y="26" width="10" height="10" rx="2"/>
      <rect x="559" y="65" width="10" height="10" rx="2"/>
      <rect x="637" y="13" width="10" height="10" rx="2"/>
    </g>

    <g fill="#22C55E">
      <rect class="meal m1" x="676" y="0" width="10" height="10" rx="2"/>
      <rect class="meal m2" x="598" y="26" width="10" height="10" rx="2"/>
      <rect class="meal m3" x="546" y="52" width="10" height="10" rx="2"/>
      <rect class="meal m4" x="494" y="13" width="10" height="10" rx="2"/>
      <rect class="meal m5" x="442" y="65" width="10" height="10" rx="2"/>
      <rect class="meal m6" x="390" y="39" width="10" height="10" rx="2"/>
      <rect class="meal m7" x="338" y="13" width="10" height="10" rx="2"/>
    </g>
  </g>

  <g class="cat">
    <path class="tail" d="M76 46C110 22 134 40 118 66" stroke="#F59E0B" stroke-width="11" stroke-linecap="round"/>
    <ellipse cx="48" cy="66" rx="48" ry="33" fill="#FBBF24" stroke="#78350F" stroke-width="4"/>
    <path d="M13 40L28 17L42 42Z" fill="#FBBF24" stroke="#78350F" stroke-width="4"/>
    <path d="M64 42L80 17L90 46Z" fill="#FBBF24" stroke="#78350F" stroke-width="4"/>
    <circle cx="32" cy="61" r="5" fill="#111827"/>
    <circle cx="64" cy="61" r="5" fill="#111827"/>
    <path d="M48 70L41 78H55L48 70Z" fill="#111827"/>
    <path class="mouth" d="M86 62L112 52L112 78L86 70Z" fill="#EF4444"/>
    <ellipse class="paw" cx="29" cy="98" rx="11" ry="7" fill="#F59E0B"/>
    <ellipse class="paw" cx="70" cy="98" rx="11" ry="7" fill="#F59E0B"/>
  </g>

  <rect x="42" y="150" width="896" height="8" rx="4" fill="#1F2937"/>
  <rect x="42" y="150" width="720" height="8" rx="4" fill="url(#bar)"/>
</svg>
