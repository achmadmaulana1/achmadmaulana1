<svg width="980" height="220" viewBox="0 0 980 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="emptyDays" width="13" height="13" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" rx="2" fill="#E5E7EB"/>
    </pattern>
    <linearGradient id="lifeBar" x1="42" y1="0" x2="938" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16A34A"/>
      <stop offset=".5" stop-color="#4ADE80"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <style>
    .head,.body{animation:snakePath 13.6s linear infinite}
    .body{filter:drop-shadow(0 2px 0 #78350f)}
    .b1{animation-delay:-12.8s}.b2{animation-delay:-12s}.b3{animation-delay:-11.2s}.b4{animation-delay:-10.4s}.b5{animation-delay:-9.6s}.b6{animation-delay:-8.8s}
    .mouth{animation:chomp .42s ease-in-out infinite; transform-origin:17px 0}
    .tail-tip{animation:tailTip .7s ease-in-out infinite; transform-origin:-7px 0}
    .route{stroke-dasharray:7 8; animation:routeMove 13.6s linear infinite}
    .target{animation-duration:13.6s; animation-timing-function:steps(1,end); animation-iteration-count:infinite}
    .t1{animation-name:e1}.t2{animation-name:e2}.t3{animation-name:e3}.t4{animation-name:e4}.t5{animation-name:e5}.t6{animation-name:e6}.t7{animation-name:e7}.t8{animation-name:e8}.t9{animation-name:e9}.t10{animation-name:e10}.t11{animation-name:e11}.t12{animation-name:e12}.t13{animation-name:e13}.t14{animation-name:e14}.t15{animation-name:e15}.t16{animation-name:e16}
    .remain{animation:remaining 13.6s steps(16,end) infinite; transform-origin:42px 180px}
    .pulse{animation:pulse 1.4s ease-in-out infinite}

    @keyframes snakePath{
      0%,100%{transform:translate(684px,53px)}
      6%{transform:translate(619px,53px)}
      12%{transform:translate(619px,92px)}
      18%{transform:translate(541px,92px)}
      24%{transform:translate(541px,66px)}
      30%{transform:translate(450px,66px)}
      36%{transform:translate(450px,131px)}
      42%{transform:translate(372px,131px)}
      48%{transform:translate(372px,105px)}
      54%{transform:translate(294px,105px)}
      60%{transform:translate(294px,66px)}
      66%{transform:translate(229px,66px)}
      72%{transform:translate(229px,118px)}
      78%{transform:translate(151px,118px)}
      84%{transform:translate(151px,79px)}
      90%{transform:translate(86px,79px)}
      96%{transform:translate(86px,53px)}
    }
    @keyframes routeMove{to{stroke-dashoffset:-260}}
    @keyframes chomp{0%,100%{transform:rotate(0)}50%{transform:rotate(-18deg)}}
    @keyframes tailTip{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(18deg)}}
    @keyframes remaining{0%{transform:scaleX(1)}100%{transform:scaleX(.08)}}
    @keyframes pulse{0%,100%{opacity:.65}50%{opacity:1}}

    @keyframes e1{0%,5%{opacity:1}6%,99%{opacity:.12}100%{opacity:1}}
    @keyframes e2{0%,11%{opacity:1}12%,99%{opacity:.12}100%{opacity:1}}
    @keyframes e3{0%,17%{opacity:1}18%,99%{opacity:.12}100%{opacity:1}}
    @keyframes e4{0%,23%{opacity:1}24%,99%{opacity:.12}100%{opacity:1}}
    @keyframes e5{0%,29%{opacity:1}30%,99%{opacity:.12}100%{opacity:1}}
    @keyframes e6{0%,35%{opacity:1}36%,99%{opacity:.12}100%{opacity:1}}
    @keyframes e7{0%,41%{opacity:1}42%,99%{opacity:.12}100%{opacity:1}}
    @keyframes e8{0%,47%{opacity:1}48%,99%{opacity:.12}100%{opacity:1}}
    @keyframes e9{0%,53%{opacity:1}54%,99%{opacity:.12}100%{opacity:1}}
    @keyframes e10{0%,59%{opacity:1}60%,99%{opacity:.12}100%{opacity:1}}
    @keyframes e11{0%,65%{opacity:1}66%,99%{opacity:.12}100%{opacity:1}}
    @keyframes e12{0%,71%{opacity:1}72%,99%{opacity:.12}100%{opacity:1}}
    @keyframes e13{0%,77%{opacity:1}78%,99%{opacity:.12}100%{opacity:1}}
    @keyframes e14{0%,83%{opacity:1}84%,99%{opacity:.12}100%{opacity:1}}
    @keyframes e15{0%,89%{opacity:1}90%,99%{opacity:.12}100%{opacity:1}}
    @keyframes e16{0%,95%{opacity:1}96%,99%{opacity:.12}100%{opacity:1}}
  </style>

  <rect width="980" height="220" rx="22" fill="#0D1117"/>
  <rect x="24" y="22" width="932" height="176" rx="18" fill="#111827" stroke="#263241" stroke-width="2"/>

  <g transform="translate(42 48)">
    <rect width="676" height="91" fill="url(#emptyDays)" opacity=".96"/>
    <rect x="676" y="0" width="10" height="10" rx="2" fill="#E5E7EB" opacity=".96"/>

    <g fill="#166534" opacity=".8">
      <rect x="13" y="0" width="10" height="10" rx="2"/><rect x="26" y="26" width="10" height="10" rx="2"/><rect x="52" y="65" width="10" height="10" rx="2"/><rect x="78" y="39" width="10" height="10" rx="2"/><rect x="104" y="13" width="10" height="10" rx="2"/><rect x="130" y="78" width="10" height="10" rx="2"/><rect x="169" y="52" width="10" height="10" rx="2"/><rect x="195" y="0" width="10" height="10" rx="2"/><rect x="260" y="26" width="10" height="10" rx="2"/><rect x="338" y="39" width="10" height="10" rx="2"/><rect x="403" y="13" width="10" height="10" rx="2"/><rect x="468" y="65" width="10" height="10" rx="2"/><rect x="559" y="0" width="10" height="10" rx="2"/><rect x="637" y="52" width="10" height="10" rx="2"/>
    </g>

    <g fill="#16A34A" opacity=".92">
      <rect x="455" y="0" width="10" height="10" rx="2"/><rect x="455" y="13" width="10" height="10" rx="2"/><rect x="455" y="26" width="10" height="10" rx="2"/><rect x="455" y="39" width="10" height="10" rx="2"/><rect x="455" y="52" width="10" height="10" rx="2"/><rect x="455" y="65" width="10" height="10" rx="2"/><rect x="455" y="78" width="10" height="10" rx="2"/>
      <rect x="468" y="0" width="10" height="10" rx="2"/><rect x="468" y="13" width="10" height="10" rx="2"/><rect x="468" y="26" width="10" height="10" rx="2"/><rect x="468" y="39" width="10" height="10" rx="2"/><rect x="468" y="52" width="10" height="10" rx="2"/><rect x="468" y="78" width="10" height="10" rx="2"/>
      <rect x="481" y="0" width="10" height="10" rx="2"/><rect x="481" y="13" width="10" height="10" rx="2"/><rect x="481" y="39" width="10" height="10" rx="2"/><rect x="481" y="52" width="10" height="10" rx="2"/><rect x="481" y="65" width="10" height="10" rx="2"/>
      <rect x="494" y="13" width="10" height="10" rx="2"/><rect x="494" y="26" width="10" height="10" rx="2"/><rect x="494" y="39" width="10" height="10" rx="2"/><rect x="494" y="78" width="10" height="10" rx="2"/>
    </g>

    <path class="route" d="M642 5H577V44H499V18H408V83H330V57H252V18H187V70H109V31H44V5H642" stroke="#22C55E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity=".38"/>

    <g fill="#22C55E">
      <rect class="target t1 pulse" x="572" y="0" width="10" height="10" rx="2"/>
      <rect class="target t2 pulse" x="572" y="39" width="10" height="10" rx="2"/>
      <rect class="target t3 pulse" x="494" y="39" width="10" height="10" rx="2"/>
      <rect class="target t4 pulse" x="494" y="13" width="10" height="10" rx="2"/>
      <rect class="target t5 pulse" x="403" y="13" width="10" height="10" rx="2"/>
      <rect class="target t6 pulse" x="403" y="78" width="10" height="10" rx="2"/>
      <rect class="target t7 pulse" x="325" y="78" width="10" height="10" rx="2"/>
      <rect class="target t8 pulse" x="325" y="52" width="10" height="10" rx="2"/>
      <rect class="target t9 pulse" x="247" y="52" width="10" height="10" rx="2"/>
      <rect class="target t10 pulse" x="247" y="13" width="10" height="10" rx="2"/>
      <rect class="target t11 pulse" x="182" y="13" width="10" height="10" rx="2"/>
      <rect class="target t12 pulse" x="182" y="65" width="10" height="10" rx="2"/>
      <rect class="target t13 pulse" x="104" y="65" width="10" height="10" rx="2"/>
      <rect class="target t14 pulse" x="104" y="26" width="10" height="10" rx="2"/>
      <rect class="target t15 pulse" x="39" y="26" width="10" height="10" rx="2"/>
      <rect class="target t16 pulse" x="39" y="0" width="10" height="10" rx="2"/>
    </g>
  </g>

  <g class="body b6"><circle r="7" fill="#92400E"/><path class="tail-tip" d="M-7 0C-18 -8 -20 8 -8 10" stroke="#FBBF24" stroke-width="4" stroke-linecap="round"/></g>
  <g class="body b5"><circle r="8" fill="#B45309"/></g>
  <g class="body b4"><circle r="9" fill="#D97706"/></g>
  <g class="body b3"><circle r="10" fill="#F59E0B"/></g>
  <g class="body b2"><circle r="11" fill="#FBBF24"/></g>
  <g class="body b1"><circle r="12" fill="#FCD34D"/></g>

  <g class="head">
    <ellipse cx="0" cy="0" rx="18" ry="15" fill="#FBBF24" stroke="#78350F" stroke-width="2.4"/>
    <path d="M-13 -10L-8 -22L-2 -9Z" fill="#FBBF24" stroke="#78350F" stroke-width="2"/>
    <path d="M9 -9L15 -22L18 -7Z" fill="#FBBF24" stroke="#78350F" stroke-width="2"/>
    <circle cx="-6" cy="-2" r="2.3" fill="#111827"/>
    <circle cx="7" cy="-2" r="2.3" fill="#111827"/>
    <path d="M1 4L-3 8H5L1 4Z" fill="#111827"/>
    <path class="mouth" d="M17 0L31 -7L31 8L17 3Z" fill="#EF4444"/>
    <path d="M-12 7L-22 11M-12 2L-23 2M13 7L23 11M13 2L24 2" stroke="#78350F" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <rect x="42" y="180" width="896" height="8" rx="4" fill="#1F2937"/>
  <rect class="remain" x="42" y="180" width="896" height="8" rx="4" fill="url(#lifeBar)"/>
</svg>
