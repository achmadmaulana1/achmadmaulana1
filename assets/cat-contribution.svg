<svg width="980" height="260" viewBox="0 0 980 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .cat{animation:walk 7s ease-in-out infinite}
    .mouth{animation:chomp .55s ease-in-out infinite; transform-origin:0 0}
    .tail{animation:tail 1.2s ease-in-out infinite; transform-origin:735px 116px}
    .paw{animation:paw .8s ease-in-out infinite}
    .bite{animation:eat 7s steps(1,end) infinite}
    .g1{animation-delay:1.4s}.g2{animation-delay:2.3s}.g3{animation-delay:3.2s}.g4{animation-delay:4.1s}.g5{animation-delay:5s}
    @keyframes walk{0%{transform:translateX(0)}50%{transform:translateX(-610px)}100%{transform:translateX(0)}}
    @keyframes chomp{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-14deg)}}
    @keyframes tail{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(16deg)}}
    @keyframes paw{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
    @keyframes eat{0%,18%{opacity:1}19%,100%{opacity:.18}}
  </style>
