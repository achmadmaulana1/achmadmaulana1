<svg width="980" height="220" viewBox="0 0 980 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="emptyDays" width="13" height="13" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" rx="2" fill="#E5E7EB"/>
    </pattern>
    <linearGradient id="lifeBar" x1="42" y1="0" x2="938" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16A34A"/>
      <stop offset=".5" stop-color="#4ADE80"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <style>
    .head,.body{animation:snakePath 14s linear infinite, runnerFade 14s linear infinite}
    .body{filter:drop-shadow(0 2px 0 #78350f)}
    .b1{animation-delay:-13.72s,-13.72s}
    .b2{animation-delay:-13.44s,-13.44s}
    .b3{animation-delay:-13.16s,-13.16s}
    .b4{animation-delay:-12.88s,-12.88s}
    .b5{animation-delay:-12.6s,-12.6s}
    .b6{animation-delay:-12.32s,-12.32s}
    .mouth{animation:chomp .42s ease-in-out infinite; transform-origin:17px 0}
    .tail-tip{animation:tailTip .7s ease-in-out infinite; transform-origin:-7px 0}
    .green-cells{stroke-dasharray:10 3; stroke-dashoffset:0}
    .eaten-cells{animation:eatRoute 14s linear infinite}
    .remain{animation:remaining 14s linear infinite; transform-origin:42px 180px}

    @keyframes snakePath{
      0%,100%{transform:translate(723px,53px)}
      7%{transform:translate(515px,53px)}
      12%{transform:translate(515px,131px)}
      15%{transform:translate(528px,131px)}
      20%{transform:translate(528px,53px)}
      23%{transform:translate(541px,53px)}
      28%{transform:translate(541px,131px)}
      31%{transform:translate(554px,131px)}
      36%{transform:translate(554px,53px)}
      39%{transform:translate(567px,53px)}
      44%{transform:translate(567px,131px)}
      47%{transform:translate(580px,131px)}
      52%{transform:translate(580px,53px)}
      55%{transform:translate(593px,53px)}
      60%{transform:translate(593px,131px)}
      63%{transform:translate(606px,131px)}
      68%{transform:translate(606px,53px)}
      73%{transform:translate(437px,53px)}
      76%{transform:translate(437px,105px)}
      80%{transform:translate(333px,105px)}
      83%{transform:translate(333px,66px)}
      87%{transform:translate(229px,66px)}
      90%{transform:translate(229px,118px)}
      93%{transform:translate(125px,118px)}
      95%{transform:translate(125px,79px)}
      97%{transform:translate(86px,79px)}
      98%{transform:translate(86px,53px)}
      99%{transform:translate(86px,53px)}
    }
    @keyframes runnerFade{
      0%,98.8%{opacity:1}
      99%,99.7%{opacity:0}
      100%{opacity:1}
    }
    @keyframes eatRoute{
      0%{stroke-dasharray:0 1000; stroke-dashoffset:0}
      98%{stroke-dasharray:1000 0; stroke-dashoffset:0}
      99.5%{stroke-dasharray:1000 0; stroke-dashoffset:0}
      100%{stroke-dasharray:0 1000; stroke-dashoffset:0}
    }
    @keyframes remaining{
      0%{transform:scaleX(1)}
      98%{transform:scaleX(.08)}
      99.5%{transform:scaleX(.08)}
      100%{transform:scaleX(1)}
    }
    @keyframes chomp{0%,100%{transform:rotate(0)}50%{transform:rotate(-18deg)}}
    @keyframes tailTip{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(18deg)}}
  </style>

  <rect width="980" height="220" rx="22" fill="#0D1117"/>
  <rect x="24" y="22" width="932" height="176" rx="18" fill="#111827" stroke="#263241" stroke-width="2"/>

  <g transform="translate(42 48)">
    <rect width="676" height="91" fill="url(#emptyDays)" opacity=".96"/>
    <rect x="676" y="0" width="10" height="10" rx="2" fill="#E5E7EB" opacity=".96"/>

    <path
      d="M681 5H473V83H486V5H499V83H512V5H525V83H538V5H551V83H564V5H395V57H291V18H187V70H83V31H44V5"
      class="green-cells"
      stroke="#22C55E"
      stroke-width="10"
      stroke-linecap="butt"
      stroke-linejoin="miter"
      pathLength="1000"
    />
    <path
      d="M681 5H473V83H486V5H499V83H512V5H525V83H538V5H551V83H564V5H395V57H291V18H187V70H83V31H44V5"
      class="eaten-cells"
      stroke="#E5E7EB"
      stroke-width="11"
      stroke-linecap="butt"
      stroke-linejoin="miter"
      pathLength="1000"
    />
  </g>

  <g class="body b6"><circle r="7" fill="#92400E"/><path class="tail-tip" d="M-7 0C-18 -8 -20 8 -8 10" stroke="#FBBF24" stroke-width="4" stroke-linecap="round"/></g>
  <g class="body b5"><circle r="8" fill="#B45309"/></g>
  <g class="body b4"><circle r="9" fill="#D97706"/></g>
  <g class="body b3"><circle r="10" fill="#F59E0B"/></g>
  <g class="body b2"><circle r="11" fill="#FBBF24"/></g>
  <g class="body b1"><circle r="12" fill="#FCD34D"/></g>

  <g class="head">
    <ellipse cx="0" cy="0" rx="18" ry="15" fill="#FBBF24" stroke="#78350F" stroke-width="2.4"/>
    <path d="M-13 -10L-8 -22L-2 -9Z" fill="#FBBF24" stroke="#78350F" stroke-width="2"/>
    <path d="M9 -9L15 -22L18 -7Z" fill="#FBBF24" stroke="#78350F" stroke-width="2"/>
    <circle cx="-6" cy="-2" r="2.3" fill="#111827"/>
    <circle cx="7" cy="-2" r="2.3" fill="#111827"/>
    <path d="M1 4L-3 8H5L1 4Z" fill="#111827"/>
    <path class="mouth" d="M17 0L31 -7L31 8L17 3Z" fill="#EF4444"/>
    <path d="M-12 7L-22 11M-12 2L-23 2M13 7L23 11M13 2L24 2" stroke="#78350F" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <rect x="42" y="180" width="896" height="8" rx="4" fill="#1F2937"/>
  <rect class="remain" x="42" y="180" width="896" height="8" rx="4" fill="url(#lifeBar)"/>
</svg>
