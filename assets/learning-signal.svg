<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .spark{animation:spark 1.6s ease-in-out infinite}
    .ring{animation:ring 2.8s linear infinite; transform-origin:120px 120px}
    .bar{animation:bar 1.4s ease-in-out infinite}
    .b2{animation-delay:.2s}.b3{animation-delay:.4s}.b4{animation-delay:.6s}
    @keyframes spark{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1.08)}}
    @keyframes ring{to{transform:rotate(360deg)}}
    @keyframes bar{0%,100%{height:32px;y:148px}50%{height:84px;y:96px}}
  </style>
  <rect width="240" height="240" rx="36" fill="#0D1117"/>
  <circle cx="120" cy="120" r="72" stroke="#1E293B" stroke-width="12"/>
  <path class="ring" d="M120 48A72 72 0 0 1 192 120" stroke="#38BDF8" stroke-width="12" stroke-linecap="round"/>
  <rect class="bar" x="72" y="148" width="18" height="32" rx="9" fill="#22C55E"/>
  <rect class="bar b2" x="102" y="130" width="18" height="50" rx="9" fill="#38BDF8"/>
  <rect class="bar b3" x="132" y="112" width="18" height="68" rx="9" fill="#F59E0B"/>
  <rect class="bar b4" x="162" y="140" width="18" height="40" rx="9" fill="#A78BFA"/>
  <path class="spark" d="M86 70L94 88L112 96L94 104L86 122L78 104L60 96L78 88L86 70Z" fill="#FACC15"/>
</svg>
